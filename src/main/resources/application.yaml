spring:
  application:
    name: universalCommunications
  webflux:
    static-path-pattern: /**
    web:
      resources:
        static-locations: classpath:/static/

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      audio:
        transcription:
          options:
            model: whisper-1
            temperature: 0.0
        speech:
          options:
            model: tts-1
            voice: alloy
            response-format: mp3
            speed: 1.0

  mongodb:
    uri: ${MONGODB_CONNECTION_STRING:mongodb://localhost:27017/universal_communications_db}
    auto-index-creation: true

uacp:
  tts:
    voice: alloy
  jwt:
    secret: ${JWT_SECRET:uacp-local-dev-secret-key-min-32-chars-long}
    expiration-ms: 86400000

logging:
  level:
    com.planet0088.universalCommunications.security: DEBUG
    com.planet0088.universalCommunications.service: DEBUG
    org.springframework.security: DEBUG
