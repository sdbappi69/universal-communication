spring:
  application:
    name: universalCommunications
  webflux:
    static-path-pattern: /**
    web:
      resources:
        static-locations: classpath:/static/

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
#  ai:
#    openai:
#      api-key: ${AZURE_OPENAI_KEY}
#      base-url: ${AZURE_OPENAI_ENDPOINT}
#      chat:
#        options:
#          deployment-name: gpt-4o
#          model: gpt-4o
#      # Azure-specific
#      azure:
#        enabled: true

  mongodb:
    uri: ${MONGODB_CONNECTION_STRING:mongodb://localhost:27017/universal_communications_db}
    auto-index-creation: true

chat-history:
  token:
    history-budget: 2000         # max tokens for conversation history
    response-budget: 1000        # max tokens for model response
    encoding-name: o200k_base    # gpt-4o-mini encoding