<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UACP Test Client</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        h2 { color: #569cd6; margin-bottom: 16px; }
        h3 { color: #569cd6; margin-bottom: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .section { border: 1px solid #2a2a2a; border-radius: 6px; padding: 14px; margin-bottom: 16px; }
        .row { display: flex; gap: 12px; margin-bottom: 10px; align-items: center; }
        label { color: #9cdcfe; width: 100px; flex-shrink: 0; }
        input, select { background: #2d2d2d; border: 1px solid #444; color: #d4d4d4;
                        padding: 6px 10px; border-radius: 4px; flex: 1; font-family: monospace; }
        textarea { background: #2d2d2d; border: 1px solid #444; color: #d4d4d4;
                   padding: 8px; border-radius: 4px; width: 100%; font-family: monospace;
                   resize: vertical; }
        button { background: #0e639c; color: white; border: none; padding: 8px 20px;
                 border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 14px; }
        button:hover { background: #1177bb; }
        button:disabled { background: #444; cursor: not-allowed; }
        #output-box { background: #0d0d0d; border: 1px solid #333; border-radius: 4px;
                      padding: 14px; margin-top: 16px; min-height: 120px; max-height: 420px;
                      overflow-y: auto; white-space: pre-wrap; line-height: 1.6; font-size: 14px; }
        #status { font-size: 12px; margin-top: 8px; }
        #auth-status { font-size: 12px; margin-left: 8px; }
        .ok { color: #4ec9b0; }
        .err { color: #f44747; }
        .dim { color: #666; }
        .token { color: #ce9178; }

        /* voice upload */
        #voice-section { display: none; }
        #drop-zone {
            border: 2px dashed #444; border-radius: 6px; padding: 24px;
            text-align: center; color: #666; cursor: pointer;
            transition: border-color 0.2s, color 0.2s; flex: 1;
        }
        #drop-zone.drag-over { border-color: #569cd6; color: #9cdcfe; }
        #drop-zone.has-file { border-color: #4ec9b0; color: #4ec9b0; }
        #drop-zone input[type=file] { display: none; }

        /* audio player */
        #audio-section { display: none; margin-top: 12px; }
        #audio-section audio { width: 100%; }
    </style>
</head>
<body>
    <h2>⚡ UACP Stream Test Client</h2>

    <!-- Auth section -->
    <div class="section">
        <h3>Authentication</h3>
        <div class="row">
            <label>User ID</label>
            <input id="userId" value="user-001" />
        </div>
        <div class="row">
            <label>Tenant ID</label>
            <input id="tenantId" value="tenant-001" />
        </div>
        <div class="row">
            <label>Email</label>
            <input id="email" value="user@example.com" />
        </div>
        <div class="row">
            <label>Role</label>
            <select id="role">
                <option>USER</option>
                <option>ADMIN</option>
            </select>
        </div>
        <div class="row">
            <label></label>
            <button onclick="getToken()">🔑 Get Token</button>
            <span id="auth-status" class="dim">no token</span>
        </div>
    </div>

    <!-- Communicate section -->
    <div class="section">
        <h3>Communicate</h3>
        <div class="row">
            <label>Session ID</label>
            <input id="sessionId" value="test-001" />
            <button onclick="newSession()" style="flex:0;padding:6px 12px;font-size:12px">New</button>
        </div>
        <div class="row">
            <label>Input Type</label>
            <select id="inputType" onchange="onInputTypeChange()">
                <option>TEXT</option>
                <option>VOICE</option>
                <option>VIDEO</option>
                <option>SYMBOL</option>
                <option>TOUCH</option>
            </select>
        </div>
        <div class="row">
            <label>Output Types</label>
            <select id="outputType">
                <option>TEXT</option>
                <option>VOICE</option>
                <option>SIGN</option>
                <option>HAPTIC</option>
            </select>
        </div>

        <!-- Text input section -->
        <div id="text-section">
            <div class="row" style="align-items:flex-start">
                <label style="padding-top:6px">Payload</label>
                <textarea id="payload" rows="3" placeholder="Type your message..."></textarea>
            </div>
        </div>

        <!-- Voice/file input section -->
        <div id="voice-section">
            <div class="row" style="align-items:flex-start">
                <label style="padding-top:6px">Audio File</label>
                <div id="drop-zone" onclick="document.getElementById('fileInput').click()"
                     ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
                    <input type="file" id="fileInput" accept="audio/*,video/*" onchange="onFileSelected(event)" />
                    <span id="drop-label">Drop audio file here or click to browse</span>
                </div>
            </div>
        </div>

        <div class="row">
            <label></label>
            <button id="sendBtn" onclick="sendRequest()">▶ Send</button>
            <span id="status" class="dim">idle</span>
        </div>
    </div>

    <div id="output-box"><span class="dim">— translation will appear here —</span></div>

    <div id="audio-section">
        <audio id="audioPlayer" controls></audio>
    </div>

    <script>
        const API        = '/api/v1/communicate/stream';
        const AUTH_API   = '/auth/token';
        const FILE_TYPES = new Set(['VOICE', 'VIDEO']);

        let selectedFile = null;
        let voiceChunks  = [];
        let token        = null;

        // ── auth ─────────────────────────────────────────────────────────────────

        async function getToken() {
            const authStatus = document.getElementById('auth-status');
            authStatus.textContent = 'requesting...';
            authStatus.className = 'dim';
            try {
                const res = await fetch(AUTH_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId:   document.getElementById('userId').value.trim(),
                        tenantId: document.getElementById('tenantId').value.trim(),
                        email:    document.getElementById('email').value.trim(),
                        role:     document.getElementById('role').value
                    })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                token = data.token;
                authStatus.textContent = `Token acquired for tenant: ${data.tenantId}`;
                authStatus.className = 'ok';
            } catch (e) {
                token = null;
                authStatus.textContent = `error: ${e.message}`;
                authStatus.className = 'err';
            }
        }

        // ── session ───────────────────────────────────────────────────────────────

        function newSession() {
            document.getElementById('sessionId').value = 'test-' + Math.random().toString(36).slice(2, 7);
        }

        function onInputTypeChange() {
            const type = document.getElementById('inputType').value;
            const isFile = FILE_TYPES.has(type);
            document.getElementById('text-section').style.display = isFile ? 'none' : 'block';
            document.getElementById('voice-section').style.display = isFile ? 'block' : 'none';
        }

        // ── drag-and-drop ────────────────────────────────────────────────────────

        function onDragOver(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.add('drag-over');
        }

        function onDragLeave(e) {
            document.getElementById('drop-zone').classList.remove('drag-over');
        }

        function onDrop(e) {
            e.preventDefault();
            const zone = document.getElementById('drop-zone');
            zone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) setFile(file);
        }

        function onFileSelected(e) {
            const file = e.target.files[0];
            if (file) setFile(file);
        }

        function setFile(file) {
            selectedFile = file;
            const zone = document.getElementById('drop-zone');
            zone.classList.add('has-file');
            document.getElementById('drop-label').textContent =
                `${file.name}  (${(file.size / 1024).toFixed(1)} KB)`;
        }

        // ── send ─────────────────────────────────────────────────────────────────

        async function sendRequest() {
            const btn    = document.getElementById('sendBtn');
            const out    = document.getElementById('output-box');
            const status = document.getElementById('status');
            const type   = document.getElementById('inputType').value;

            if (!token) {
                status.textContent = 'Please get a token first';
                status.className = 'err';
                return;
            }

            btn.disabled = true;
            out.innerHTML = '';
            voiceChunks = [];
            document.getElementById('audio-section').style.display = 'none';
            status.textContent = 'connecting...';
            status.className = 'dim';

            const start      = Date.now();
            let   tokenCount = 0;

            try {
                const fd = new FormData();
                fd.append('sessionId',   document.getElementById('sessionId').value.trim());
                fd.append('inputType',   type);
                fd.append('outputTypes', document.getElementById('outputType').value);

                if (FILE_TYPES.has(type)) {
                    if (!selectedFile) {
                        status.textContent = 'no audio file selected';
                        status.className = 'err';
                        btn.disabled = false;
                        return;
                    }
                    fd.append('file', selectedFile);
                    status.textContent = 'transcribing...';
                } else {
                    const payload = document.getElementById('payload').value.trim();
                    if (!payload) {
                        status.textContent = 'payload is empty';
                        status.className = 'err';
                        btn.disabled = false;
                        return;
                    }
                    fd.append('payload', payload);
                }

                const res = await fetch(API, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'text/event-stream'
                    },
                    body: fd
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                status.textContent = 'streaming...';
                status.className = 'ok';

                const reader  = res.body.getReader();
                const decoder = new TextDecoder();
                let   buffer  = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const json = line.slice(5).trim();
                            try {
                                const chunk = JSON.parse(json);
                                if (chunk.content === '[DONE]') continue;
                                if (!chunk.content) continue;

                                if (chunk.outputType === 'VOICE') {
                                    voiceChunks.push(chunk.content);
                                } else {
                                    const span = document.createElement('span');
                                    span.className = 'token';
                                    span.textContent = chunk.content;
                                    out.appendChild(span);
                                    out.scrollTop = out.scrollHeight;
                                    tokenCount++;
                                }
                            } catch (_) {}
                        }
                        if (line.startsWith('event:done')) {
                            const ms = Date.now() - start;
                            status.innerHTML = `✓ done &nbsp;|&nbsp; ${tokenCount} tokens &nbsp;|&nbsp; ${ms}ms`;
                            status.className = 'ok';
                            if (voiceChunks.length > 0) {
                                playVoiceChunks(voiceChunks);
                            }
                        }
                        if (line.startsWith('event:error')) {
                            status.textContent = 'stream error — check console';
                            status.className = 'err';
                        }
                    }
                }
            } catch (e) {
                status.textContent = `error: ${e.message}`;
                status.className = 'err';
            } finally {
                btn.disabled = false;
            }
        }

        function playVoiceChunks(chunks) {
            const combined = chunks.join('');
            const binary   = atob(combined);
            const bytes    = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const blob = new Blob([bytes], { type: 'audio/mpeg' });
            const url  = URL.createObjectURL(blob);
            const player = document.getElementById('audioPlayer');
            player.src = url;
            document.getElementById('audio-section').style.display = 'block';
            player.play().catch(e => console.error('Audio play failed:', e));
        }

        document.getElementById('payload').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendRequest(); }
        });
    </script>
</body>
</html>
